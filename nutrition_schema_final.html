
<div id="erd" style="padding: 1rem 0"></div>
<style>
#erd svg { width: 100%; }
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  USER ||--o{ MEAL_LOG : "enregistre"
  USER ||--o{ FRIDGE_ITEM : "possède"
  USER ||--o{ SHOPPING_LIST : "crée"
  USER ||--o{ USER_NUTRITIONAL_GOALS : "définit"
  USER ||--o{ RECIPE : "crée"

  MEAL_LOG ||--o{ MEAL_LOG_ITEM : "contient"

  MEAL_LOG_ITEM }o--o| RECIPE : "via recette (nullable)"
  MEAL_LOG_ITEM }o--o| INGREDIENT : "via ingrédient (nullable)"

  RECIPE ||--o{ RECIPE_INGREDIENT : "composée de"
  INGREDIENT ||--o{ RECIPE_INGREDIENT : "utilisé dans"
  INGREDIENT ||--o{ FRIDGE_ITEM : "stocké"
  INGREDIENT ||--o{ SHOPPING_LIST : "listé"
  INGREDIENT ||--o{ INGREDIENT_NUTRIENT : "contient"

  NUTRIENT ||--o{ INGREDIENT_NUTRIENT : "décrit"
  NUTRIENT ||--o{ USER_NUTRITIONAL_GOALS : "cible"

  USER {
    uuid id PK
    string email
    string username
    string password_hash
    timestamp created_at
  }

  MEAL_LOG {
    uuid id PK
    uuid user_id FK
    date log_date
    string notes
    timestamp created_at
  }

  MEAL_LOG_ITEM {
    uuid id PK
    uuid meal_log_id FK
    uuid recipe_id "FK nullable"
    uuid ingredient_id "FK nullable"
    float quantity
    string unit
  }

  INGREDIENT {
    uuid id PK
    string name
    string category
    float calories_per_100g
    float proteins_per_100g
    float carbs_per_100g
    float fats_per_100g
    float fiber_per_100g
    string unit
  }

  NUTRIENT {
    uuid id PK
    string name
    string unit
    string category
  }

  INGREDIENT_NUTRIENT {
    uuid id PK
    uuid ingredient_id FK
    uuid nutrient_id FK
    float amount_per_100g
  }

  USER_NUTRITIONAL_GOALS {
    uuid id PK
    uuid user_id FK
    uuid nutrient_id FK
    float daily_target
    timestamp updated_at
  }

  RECIPE {
    uuid id PK
    uuid created_by FK
    string title
    string description
    int prep_time_min
    int cook_time_min
    int servings
    bool is_vegan
  }

  RECIPE_INGREDIENT {
    uuid id PK
    uuid recipe_id FK
    uuid ingredient_id FK
    float quantity
    string unit
  }

  FRIDGE_ITEM {
    uuid id PK
    uuid user_id FK
    uuid ingredient_id FK
    float quantity
    string unit
    date expiry_date
    timestamp added_at
  }

  SHOPPING_LIST {
    uuid id PK
    uuid user_id FK
    uuid ingredient_id FK
    float quantity
    string unit
    bool is_checked
    timestamp created_at
  }
`);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
