services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: frigood
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/frigood
      API_KEY: ${API_KEY}
    volumes:
      - .:/app
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      postgres:
        condition: service_healthy

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api:8000
      API_KEY: ${API_KEY}
      STREAMLIT_PASSWORD: ${STREAMLIT_PASSWORD}
    volumes:
      - .:/app
    depends_on:
      - api

  streamlit_user:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    command: streamlit run streamlit_user.py --server.port=8502 --server.address=0.0.0.0
    ports:
      - "8502:8502"
    environment:
      API_URL: http://api:8000
      API_KEY: ${API_KEY}
    volumes:
      - .:/app
    depends_on:
      - api

volumes:
  postgres_data:
